<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #13161d;
      --border: #1e2330;
      --accent: #f5c518;
      --accent2: #4fc3f7;
      --danger: #ff5252;
      --text: #e8eaf0;
      --muted: #6b7280;
      --flash: #fffde7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .bolt { font-size: 1.6rem; }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--accent);
    }

    header p {
      margin-left: auto;
      font-size: .8rem;
      color: var(--muted);
    }

    main {
      width: 100%;
      max-width: 960px;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .camera-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    #video-wrap {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    #analysis-canvas { display: none; }

    #flash-overlay {
      position: absolute;
      inset: 0;
      background: var(--flash);
      opacity: 0;
      pointer-events: none;
      transition: opacity 60ms ease-out;
    }
    #flash-overlay.flashing { opacity: .85; }

    .no-camera-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: .95rem;
      padding: 40px;
      text-align: center;
    }
    .no-camera-msg span { font-size: 3rem; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: .82rem;
    }

    .indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .indicator.watching  { background: #4caf50; box-shadow: 0 0 6px #4caf50; animation: pulse 1.4s infinite; }
    .indicator.triggered { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    #status-text  { flex: 1; }
    #capture-count { color: var(--accent); font-weight: 600; }

    .controls-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 520px) { .controls-card { grid-template-columns: 1fr; } }

    .control-group label {
      display: block;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .control-group .row { display: flex; align-items: center; gap: 10px; }

    input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }

    .val-badge {
      min-width: 38px;
      text-align: right;
      font-size: .85rem;
      font-weight: 600;
      color: var(--accent);
    }

    .btn-row { grid-column: 1 / -1; display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      cursor: pointer; border: none; border-radius: 8px;
      padding: 9px 20px; font-size: .9rem; font-weight: 600;
      transition: filter .15s, transform .1s;
    }
    button:active   { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #btn-start { background: #4caf50; color: #fff; }
    #btn-stop  { background: var(--danger); color: #fff; }
    #btn-clear { background: var(--border); color: var(--muted); margin-left: auto; }
    button:hover:not(:disabled) { filter: brightness(1.12); }

    .graph-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .graph-card h2 {
      font-size: .8rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
    }
    #brightness-graph {
      width: 100%; height: 70px; border-radius: 6px; display: block; background: #0d0f14;
    }

    .gallery-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .gallery-card h2 {
      font-size: .9rem; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .gallery-card h2 span {
      background: var(--accent); color: #000;
      border-radius: 20px; font-size: .72rem; padding: 1px 8px;
    }
    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .gallery-empty { color: var(--muted); font-size: .9rem; padding: 20px 0; text-align: center; }

    .thumb-wrap {
      position: relative; border-radius: 8px; overflow: hidden;
      aspect-ratio: 16/9; background: #000; cursor: pointer;
      border: 2px solid transparent; transition: border-color .2s;
    }
    .thumb-wrap:hover { border-color: var(--accent); }
    .thumb-wrap img   { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-ts {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.7); font-size: .68rem; padding: 3px 6px; color: #ccc;
    }
    .thumb-dl {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,.65); border-radius: 5px;
      padding: 3px 6px; font-size: .7rem; color: var(--accent2);
      text-decoration: none; opacity: 0; transition: opacity .2s;
    }
    .thumb-wrap:hover .thumb-dl { opacity: 1; }

    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.9); z-index: 1000;
      align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    }
    #lightbox.open { display: flex; }
    #lightbox img  { max-width: 90vw; max-height: 75vh; border-radius: 8px; border: 2px solid var(--border); }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 1.8rem; cursor: pointer; color: var(--muted); background: none; border: none; padding: 4px;
    }
  </style>
</head>
<body>

<header>
  <span class="bolt">&#9889;</span>
  <h1>Lightning Detector</h1>
  <p>Auto-captures on brightness spike</p>
</header>

<main>

  <div class="camera-card">
    <div id="video-wrap">
      <video id="camera-video" autoplay playsinline muted></video>
      <canvas id="analysis-canvas"></canvas>
      <div id="flash-overlay"></div>
      <div id="no-camera" class="no-camera-msg" style="display:none">
        <span>&#128247;</span>
        <p>Camera not started.<br>Press <strong>Start Watching</strong> below.</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="indicator" id="dot"></div>
      <span id="status-text">Camera off</span>
      <span id="debug-txt" style="font-size:.75rem;color:var(--muted);margin-left:auto;margin-right:8px"></span>
      <span>Photos: <span id="capture-count">0</span></span>
    </div>
  </div>

  <div class="controls-card">
    <div class="control-group">
      <label>Sensitivity (brightness jump %)</label>
      <div class="row">
        <input type="range" id="threshold-slider" min="5" max="60" value="20" step="1" />
        <span class="val-badge" id="threshold-val">20%</span>
      </div>
    </div>
    <div class="control-group">
      <label>Cooldown between captures (s)</label>
      <div class="row">
        <input type="range" id="cooldown-slider" min="1" max="10" value="2" step="1" />
        <span class="val-badge" id="cooldown-val">2s</span>
      </div>
    </div>
    <div class="btn-row">
      <button id="btn-start">&#9654; Start Watching</button>
      <button id="btn-stop" disabled>&#9632; Stop</button>
      <button id="btn-clear">Clear Photos</button>
    </div>
  </div>

  <div class="graph-card">
    <h2>Live Brightness</h2>
    <canvas id="brightness-graph"></canvas>
  </div>

  <div class="gallery-card">
    <h2>Captured Photos <span id="count-badge">0</span></h2>
    <div id="gallery-grid">
      <p class="gallery-empty">No photos yet. Start watching and wait for lightning!</p>
    </div>
  </div>

</main>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" title="Close">&times;</button>
  <img id="lightbox-img" src="" alt="Captured lightning" />
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button id="lightbox-share" style="background:#4caf50;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:.9rem;font-weight:600;cursor:pointer">&#128190; Save to Photos</button>
    <a id="lightbox-dl" href="#" download="lightning.png" style="background:var(--accent);color:#000;text-decoration:none;border-radius:8px;padding:9px 20px;font-weight:700;font-size:.9rem;display:flex;align-items:center">&#8595; Download</a>
  </div>
</div>

<canvas id="capture-canvas" style="display:none"></canvas>

<script>
(() => {
  const video       = document.getElementById('camera-video');
  const analysisCvs = document.getElementById('analysis-canvas');
  const captCvs     = document.getElementById('capture-canvas');
  const flashOvr    = document.getElementById('flash-overlay');
  const noCam       = document.getElementById('no-camera');
  const dot         = document.getElementById('dot');
  const statusTxt   = document.getElementById('status-text');
  const debugTxt    = document.getElementById('debug-txt');
  const captCount   = document.getElementById('capture-count');
  const countBadge  = document.getElementById('count-badge');
  const btnStart    = document.getElementById('btn-start');
  const btnStop     = document.getElementById('btn-stop');
  const btnClear    = document.getElementById('btn-clear');
  const threshSlide = document.getElementById('threshold-slider');
  const threshVal   = document.getElementById('threshold-val');
  const coolSlide   = document.getElementById('cooldown-slider');
  const coolVal     = document.getElementById('cooldown-val');
  const galleryGrid = document.getElementById('gallery-grid');
  const graphCvs    = document.getElementById('brightness-graph');
  const lightbox    = document.getElementById('lightbox');
  const lbImg       = document.getElementById('lightbox-img');
  const lbDl        = document.getElementById('lightbox-dl');
  const lbShare     = document.getElementById('lightbox-share');
  const lbClose     = document.getElementById('lightbox-close');

  const analysisCtx = analysisCvs.getContext('2d', { willReadFrequently: true });
  const captCtx     = captCvs.getContext('2d');
  const graphCtx    = graphCvs.getContext('2d');

  let stream          = null;
  let watching        = false;
  let rafId           = null;
  let lastCaptureTime = 0;
  let photos          = [];
  let brightHistory   = [];
  const HIST_LEN      = 200;
  let rollingAvg      = -1;
  const SMOOTH        = 0.05;
  const MIN_ABS_DELTA = 18;

  /* ── Persist photos in localStorage ── */
  function savePhotosToStorage() {
    try {
      const data = photos.map(p => ({ dataUrl: p.dataUrl, ts: p.ts.toISOString() }));
      localStorage.setItem('lightning_photos', JSON.stringify(data));
    } catch (e) { /* storage full */ }
  }

  function loadPhotosFromStorage() {
    try {
      const raw = localStorage.getItem('lightning_photos');
      if (!raw) return;
      const data = JSON.parse(raw);
      data.forEach(p => {
        const entry = { dataUrl: p.dataUrl, ts: new Date(p.ts) };
        photos.push(entry);
        addThumb(entry);
      });
      captCount.textContent  = photos.length;
      countBadge.textContent = photos.length;
    } catch (e) { localStorage.removeItem('lightning_photos'); }
  }

  function resizeGraph() {
    graphCvs.width  = graphCvs.offsetWidth;
    graphCvs.height = graphCvs.offsetHeight;
  }
  resizeGraph();
  window.addEventListener('resize', resizeGraph);

  threshSlide.addEventListener('input', () => { threshVal.textContent = threshSlide.value + '%'; });
  coolSlide.addEventListener('input',   () => { coolVal.textContent   = coolSlide.value   + 's'; });

  btnStart.addEventListener('click', startWatching);
  btnStop.addEventListener('click',  stopWatching);

  async function startWatching() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
    } catch (err) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      } catch (err2) {
        setStatus('Camera access denied: ' + err2.message);
        return;
      }
    }

    video.srcObject = stream;
    await video.play();
    noCam.style.display = 'none';
    video.style.display = 'block';

    analysisCvs.width  = 64;
    analysisCvs.height = 36;

    watching        = true;
    rollingAvg      = -1;
    lastCaptureTime = 0;
    brightHistory   = [];

    btnStart.disabled = true;
    btnStop.disabled  = false;
    dot.className     = 'indicator watching';
    setStatus('Watching for lightning\u2026');

    analyzeFrame();
  }

  function stopWatching() {
    watching = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    debugTxt.textContent = '';
    btnStart.disabled = false;
    btnStop.disabled  = true;
    dot.className     = 'indicator';
    setStatus('Camera off');
  }

  function analyzeFrame() {
    if (!watching) return;
    if ('requestVideoFrameCallback' in video) {
      video.requestVideoFrameCallback(analyzeFrame);
    } else {
      rafId = requestAnimationFrame(analyzeFrame);
    }
    if (video.readyState < 2) return;

    analysisCtx.drawImage(video, 0, 0, analysisCvs.width, analysisCvs.height);
    const px = analysisCtx.getImageData(0, 0, analysisCvs.width, analysisCvs.height).data;

    let sum = 0, count = 0;
    for (let i = 0; i < px.length; i += 12) {
      sum += 0.299 * px[i] + 0.587 * px[i+1] + 0.114 * px[i+2];
      count++;
    }
    const bright = sum / count;

    if (rollingAvg < 0) { rollingAvg = bright; }

    const threshold   = parseFloat(threshSlide.value) / 100;
    const cooldownMs  = parseFloat(coolSlide.value) * 1000;
    const now         = Date.now();
    const absDelta    = bright - rollingAvg;
    const spikeFactor = rollingAvg > 0 ? absDelta / rollingAvg : 0;

    debugTxt.textContent = 'avg:' + rollingAvg.toFixed(0) + ' cur:' + bright.toFixed(0) + ' spike:' + (spikeFactor*100).toFixed(0) + '%';

    if (spikeFactor >= threshold && absDelta >= MIN_ABS_DELTA && (now - lastCaptureTime) > cooldownMs) {
      triggerCapture(bright, spikeFactor);
      lastCaptureTime = now;
    }

    rollingAvg = rollingAvg * (1 - SMOOTH) + bright * SMOOTH;
    brightHistory.push(bright);
    if (brightHistory.length > HIST_LEN) brightHistory.shift();
    drawGraph(bright, rollingAvg * (1 + threshold));
  }

  function triggerCapture(bright, factor) {
    dot.className = 'indicator triggered';
    flashOvr.classList.add('flashing');
    setStatus('&#9889; Lightning detected! (+' + Math.round(factor*100) + '% spike)');
    setTimeout(() => {
      flashOvr.classList.remove('flashing');
      dot.className = 'indicator watching';
      setStatus('Watching for lightning\u2026');
    }, 400);

    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;
    captCvs.width  = vw; captCvs.height = vh;
    captCtx.save();
    captCtx.translate(vw, 0); captCtx.scale(-1, 1);
    captCtx.drawImage(video, 0, 0, vw, vh);
    captCtx.restore();

    const dataUrl = captCvs.toDataURL('image/png');
    const ts = new Date();
    const entry = { dataUrl, ts };
    photos.unshift(entry);
    addThumb(entry);
    captCount.textContent  = photos.length;
    countBadge.textContent = photos.length;
    savePhotosToStorage();
  }

  function addThumb({ dataUrl, ts }) {
    const empty = galleryGrid.querySelector('.gallery-empty');
    if (empty) empty.remove();

    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';

    const img = document.createElement('img');
    img.src = dataUrl; img.alt = 'Lightning capture';

    const label = document.createElement('div');
    label.className = 'thumb-ts';
    label.textContent = formatTime(ts);

    const filename = 'lightning_' + ts.toISOString().replace(/[:.]/g,'-') + '.png';
    const dl = document.createElement('a');
    dl.className = 'thumb-dl'; dl.href = dataUrl;
    dl.download = filename; dl.textContent = '\u2193';

    wrap.appendChild(img); wrap.appendChild(label); wrap.appendChild(dl);
    galleryGrid.prepend(wrap);

    wrap.addEventListener('click', (e) => {
      if (e.target === dl) return;
      lbImg.src     = dataUrl;
      lbDl.href     = dataUrl;
      lbDl.download = filename;
      lbShare._cur  = { dataUrl, filename };
      lightbox.classList.add('open');
    });
  }

  lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });

  lbShare.addEventListener('click', () => {
    const cur = lbShare._cur;
    if (cur) saveToPhotos(cur.dataUrl, cur.filename);
  });

  async function saveToPhotos(dataUrl, filename) {
    if (navigator.share) {
      try {
        const res  = await fetch(dataUrl);
        const blob = await res.blob();
        const file = new File([blob], filename || 'lightning.png', { type: 'image/png' });
        await navigator.share({ files: [file], title: 'Lightning capture' });
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    // Fallback: download
    const a = document.createElement('a');
    a.href = dataUrl; a.download = filename || 'lightning.png'; a.click();
  }

  btnClear.addEventListener('click', () => {
    photos = [];
    galleryGrid.innerHTML = '<p class="gallery-empty">No photos yet. Start watching and wait for lightning!</p>';
    captCount.textContent = '0'; countBadge.textContent = '0';
    localStorage.removeItem('lightning_photos');
  });

  function drawGraph(current, triggerLine) {
    const W = graphCvs.width, H = graphCvs.height;
    graphCtx.clearRect(0, 0, W, H);
    if (brightHistory.length < 2) return;
    const max = 255, xStep = W / (HIST_LEN - 1);
    const trigY = H - (triggerLine / max) * H;
    graphCtx.strokeStyle = 'rgba(245,197,24,0.35)';
    graphCtx.lineWidth = 1; graphCtx.setLineDash([4,4]);
    graphCtx.beginPath(); graphCtx.moveTo(0, trigY); graphCtx.lineTo(W, trigY); graphCtx.stroke();
    graphCtx.setLineDash([]);
    graphCtx.strokeStyle = '#4fc3f7'; graphCtx.lineWidth = 1.5;
    graphCtx.beginPath();
    brightHistory.forEach((v, i) => {
      const x = i * xStep, y = H - (v / max) * H;
      i === 0 ? graphCtx.moveTo(x, y) : graphCtx.lineTo(x, y);
    });
    graphCtx.stroke();
    const lastX = (brightHistory.length - 1) * xStep;
    const lastY = H - (current / max) * H;
    graphCtx.fillStyle = '#4fc3f7';
    graphCtx.beginPath(); graphCtx.arc(lastX, lastY, 3, 0, Math.PI*2); graphCtx.fill();
  }

  function setStatus(msg) { statusTxt.innerHTML = msg; }
  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  noCam.style.display = 'flex';
  video.style.display = 'none';

  // Load saved photos on startup
  loadPhotosFromStorage();

})();
</script>
</body>
</html>
